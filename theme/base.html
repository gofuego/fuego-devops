<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Page.Envelope.title}} | {{.Site.Name}}</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --orange: #d29922;
            --red: #f85149;
            --purple: #bc8cff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
        }
        header h1 { font-size: 1.25rem; font-weight: 600; }
        header h1 a { color: var(--accent); text-decoration: none; }
        main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        .source-path {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-family: 'SFMono-Regular', Consolas, monospace;
        }
        .page-title { font-size: 1.75rem; margin-bottom: 0.5rem; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
        }
        .card h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: monospace;
        }
        .badge-blue { background: #1f6feb33; color: var(--accent); }
        .badge-green { background: #23883033; color: var(--green); }
        .badge-orange { background: #9e6a0333; color: var(--orange); }
        .badge-purple { background: #8957e533; color: var(--purple); }
        .kv-table { width: 100%; border-collapse: collapse; }
        .kv-table td {
            padding: 0.35rem 0.75rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .kv-table td:first-child {
            color: var(--text-muted);
            width: 140px;
            font-family: monospace;
        }
        code, .mono {
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.875rem;
        }
        .comment-text {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <header>
        <h1><a href="/">{{.Site.Name}}</a></h1>
    </header>
    <main>
        {{block "content" .}}<div>{{.Page.Content}}</div>{{end}}
    </main>
</body>
</html>
