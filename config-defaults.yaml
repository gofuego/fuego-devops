# Config defaults contributed by the devops pack. The site config (or the
# fuego-devops CLI options) is deep-merged on top.
routes:
  dockerfile: "/dockerfiles/{slug}"
  k8s: "/kubernetes/{slug}"

taxonomies:
  resource_kind:
    path: "/by-kind/{term}"
    layout: "default"
    index_path: "/by-kind"
    index_layout: "default"
